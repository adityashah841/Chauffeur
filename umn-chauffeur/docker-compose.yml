# docker-compose.yml
# Run the full UMN Chauffeur stack with one command:
#   docker compose up --build
#
# Then open:  http://localhost
#   /student  – Student app
#   /driver   – Driver app
#   /admin    – Admin dashboard

services:

  # ── Backend: Node.js + Express + Socket.IO ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umn-chauffeur-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/data/chauffeur.sqlite   # persisted via named volume
    volumes:
      - db-data:/data                    # SQLite DB survives container restarts
    # Port 3001 is intentionally NOT exposed to the host — only nginx talks to it.
    # Uncomment the line below if you need direct backend access for debugging:
    # ports:
    #   - "3001:3001"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend: React (built) served by nginx ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umn-chauffeur-frontend
    restart: unless-stopped
    ports:
      - "80:80"                          # Access the app at http://localhost
    depends_on:
      backend:
        condition: service_healthy       # Wait for backend health check to pass
    networks:
      - app-net

# ── Named volume for SQLite persistence ──────────────────────────────────────
volumes:
  db-data:
    name: umn-chauffeur-db

# ── Internal bridge network ───────────────────────────────────────────────────
networks:
  app-net:
    driver: bridge
