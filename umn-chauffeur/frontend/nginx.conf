# frontend/nginx.conf
# Serves the React SPA and reverse-proxies /api + /socket.io to the backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── Static assets (JS/CSS bundles) – aggressive caching ──────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy REST API → backend ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Proxy Socket.IO (WebSocket + polling) → backend ───────────────────────
    location /socket.io/ {
        proxy_pass         http://backend:3001/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;   # keep WS connections alive
    }

    # ── Health check endpoint ─────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend:3001/health;
    }

    # ── SPA catch-all: every unknown path returns index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
